<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Black Circle Ring with White Background -->
  <circle cx="50" cy="50" r="43" stroke="black" stroke-width="3" fill="#ffffff" />

  <!-- The Lines of the Y (Slightly thinner to make the dots pop) -->
  <path 
    d="M 37 38 L 50 53 L 63 38 M 50 53 L 50 71" 
    stroke="black" 
    stroke-width="5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none" 
  />

  <!-- The Dots at the ends of the arms -->
  <circle cx="37" cy="38" r="4.5" fill="black" /> <!-- Top Left Dot -->
  <circle cx="63" cy="38" r="4.5" fill="black" /> <!-- Top Right Dot -->
  <circle cx="50" cy="71" r="4.5" fill="black" /> <!-- Bottom Dot -->
</svg>
