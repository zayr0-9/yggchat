<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/img/logo-l-thick.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="transparent" />
    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jaini&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Baumans&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Germania+One&display=swap" rel="stylesheet" />

    <title>Yggdrasil</title>
    <script>
      // Apply theme early to avoid FOUC and respect system preference
      ;(function () {
        try {
          var saved = localStorage.getItem('theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var hasExplicit = saved === 'dark' || saved === 'light'
          var isDark = hasExplicit ? saved === 'dark' : prefersDark
          document.documentElement.classList.toggle('dark', isDark)
        } catch (e) {
          // no-op
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
