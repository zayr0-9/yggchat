name: Desktop Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Electron release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ygg-chat/package-lock.json

      - name: Install workspace dependencies
        run: |
          cd ygg-chat
          npm install
          npm --prefix client/ygg-chat-r install
          npm --prefix server install

      - name: Configure environment variables
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          echo "VITE_ENVIRONMENT=electron" >> $GITHUB_ENV
          echo "VITE_API_URL=https://webdrasil-production.up.railway.app/api" >> $GITHUB_ENV
        shell: bash

      - name: Build ${{ matrix.os }}
        run: |
          cd ygg-chat/client/ygg-chat-r
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npm run build:win
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npm run build:linux
          else
            npm run build:mac
          fi
        shell: bash
      - name: Upload release artifacts to Supabase
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_UPDATE_BUCKET }}
        run: |
          set -euo pipefail
          cd ygg-chat/client/ygg-chat-r/release

          case "${{ matrix.os }}" in
            windows-latest) platform_dir="windows" ;;
            ubuntu-latest) platform_dir="linux" ;;
            macos-latest) platform_dir="mac" ;;
            *) echo "Unsupported platform: ${{ matrix.os }}" && exit 1 ;;
          esac

          target_prefix="updates/${platform_dir}"

          for artifact in *; do
            echo "Uploading ${artifact} to ${target_prefix}/${artifact}"
            curl -sSf \
              -X POST "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${target_prefix}/${artifact}?upsert=true" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${artifact}"
          done
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: ygg-chat/client/ygg-chat-r/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ygg-chat/client/ygg-chat-r/release/*
          draft: false
          prerelease: false
