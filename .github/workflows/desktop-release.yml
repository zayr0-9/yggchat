name: Desktop Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22.x]
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ygg-chat/package-lock.json

      - name: Install workspace dependencies
        run: |
          cd ygg-chat
          npm ci --include=optional

      - name: Ensure Rollup native binary is present
        shell: bash
        run: |
          set -euo pipefail
          cd ygg-chat

          case "${{ matrix.os }}" in
            ubuntu-latest)
              ROLLUP_PKG="@rollup/rollup-linux-x64-gnu"
              ;;
            macos-latest)
              NODE_ARCH="$(node -p "process.arch")"
              if [ "${NODE_ARCH}" = "arm64" ]; then
                ROLLUP_PKG="@rollup/rollup-darwin-arm64"
              else
                ROLLUP_PKG="@rollup/rollup-darwin-x64"
              fi
              ;;
            *)
              echo "Unsupported OS for rollup preflight: ${{ matrix.os }}"
              exit 1
              ;;
          esac

          ROLLUP_VERSION="$(node -p "require('./client/ygg-chat-r/node_modules/rollup/package.json').version")"
          echo "Expected Rollup native package: ${ROLLUP_PKG}@${ROLLUP_VERSION}"

          if node -e "require.resolve('${ROLLUP_PKG}', { paths: ['./client/ygg-chat-r'] })" >/dev/null 2>&1; then
            echo "Rollup native package already present"
          else
            echo "Rollup native package missing; installing fallback"
            npm --prefix client/ygg-chat-r install --no-save --include=optional "${ROLLUP_PKG}@${ROLLUP_VERSION}"
          fi

      - name: Configure environment variables
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          echo "VITE_ENVIRONMENT=electron" >> $GITHUB_ENV
          echo "VITE_API_URL=https://webdrasil-production.up.railway.app/api" >> $GITHUB_ENV
          echo "SUPABASE_UPDATE_FEED_BASE_URL=${{ secrets.SUPABASE_UPDATE_FEED_BASE_URL }}" >> $GITHUB_ENV
        shell: bash

      - name: Validate tag matches app version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -p "require('./ygg-chat/client/ygg-chat-r/package.json').version")"

          echo "Tag version: ${TAG_VERSION}"
          echo "App version: ${APP_VERSION}"

          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "ERROR: Tag version (${TAG_VERSION}) does not match client/ygg-chat-r/package.json version (${APP_VERSION})"
            exit 1
          fi

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG_FILE="ygg-chat/client/ygg-chat-r/CHANGELOG.md"
          RELEASE_NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          if [ ! -f "${CHANGELOG_FILE}" ]; then
            echo "ERROR: ${CHANGELOG_FILE} not found"
            exit 1
          fi

          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" || $0 ~ "^## " ver "([[:space:]-]|$)" {
              in_section = 1
              next
            }
            in_section && /^## / { exit }
            in_section { print }
          ' "${CHANGELOG_FILE}" > "${RELEASE_NOTES_FILE}.raw"

          awk '
            BEGIN { started = 0 }
            {
              if (!started && $0 ~ /^[[:space:]]*$/) next
              started = 1
              print
            }
          ' "${RELEASE_NOTES_FILE}.raw" > "${RELEASE_NOTES_FILE}"

          if ! grep -q '[^[:space:]]' "${RELEASE_NOTES_FILE}"; then
            echo "ERROR: No changelog entry found for version ${VERSION} in ${CHANGELOG_FILE}"
            exit 1
          fi

          echo "Release notes extracted to ${RELEASE_NOTES_FILE}"

      - name: Build ${{ matrix.os }}
        run: |
          set -euo pipefail
          cd ygg-chat
          npm run build:electron
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npm run package:electron -- --linux
          else
            npm run package:electron -- --mac
          fi
        shell: bash

      - name: Inject release notes into update manifest
        shell: bash
        run: |
          set -euo pipefail
          cd ygg-chat/client/ygg-chat-r/release

          RELEASE_NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          shopt -s nullglob
          manifests=(latest*.yml)
          shopt -u nullglob

          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "ERROR: No latest*.yml manifest found in release directory"
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            awk '
              BEGIN { skip = 0 }
              /^releaseNotes:/ { skip = 1; next }
              skip && /^[^[:space:]]/ { skip = 0 }
              !skip { print }
            ' "${manifest}" > "${manifest}.tmp"
            mv "${manifest}.tmp" "${manifest}"

            {
              echo ""
              echo "releaseNotes: |-"
              sed 's/^/  /' "${RELEASE_NOTES_FILE}"
            } >> "${manifest}"

            echo "Injected release notes into ${manifest}"
          done

      - name: Upload update artifacts to Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail
          cd ygg-chat/client/ygg-chat-r/release

          # Validation
          echo "=== Supabase Upload Configuration ==="

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "ERROR: SUPABASE_URL is not set"
            exit 1
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "ERROR: SUPABASE_SERVICE_ROLE_KEY is not set"
            exit 1
          fi

          if [ -z "${SUPABASE_BUCKET:-}" ]; then
            echo "ERROR: SUPABASE_BUCKET is not set"
            exit 1
          fi

          if [[ ! "${SUPABASE_URL}" =~ ^https?:// ]]; then
            echo "ERROR: SUPABASE_URL must include protocol (https://)"
            echo "Current value: ${SUPABASE_URL}"
            exit 1
          fi

          echo "SUPABASE_URL: ${SUPABASE_URL}"
          echo "SUPABASE_BUCKET: ${SUPABASE_BUCKET}"
          echo "Platform: ${{ matrix.os }}"
          echo ""

          # Platform detection
          case "${{ matrix.os }}" in
            ubuntu-latest) platform_dir="linux" ;;
            macos-latest) platform_dir="mac" ;;
            *) echo "Unsupported platform: ${{ matrix.os }}" && exit 1 ;;
          esac

          target_prefix="updates/${platform_dir}"

          echo "=== Files to Upload ==="
          ls -lh
          echo ""

          # Upload with detailed logging
          echo "=== Starting Upload Process ==="
          upload_count=0
          failure_count=0

          for artifact in *; do
            if [ -d "${artifact}" ]; then
              echo "Skipping directory: ${artifact}"
              continue
            fi

            file_size=$(stat -c%s "${artifact}" 2>/dev/null || stat -f%z "${artifact}" 2>/dev/null || echo "unknown")
            upload_url="${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${target_prefix}/${artifact}?upsert=true"

            echo ""
            echo "Uploading: ${artifact}"
            echo "  Size: ${file_size} bytes"
            echo "  Target: ${target_prefix}/${artifact}"

            http_code=$(curl -s -w "%{http_code}" -o /tmp/upload_response.txt \
              -X PUT "${upload_url}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${artifact}")

            response_body=$(cat /tmp/upload_response.txt 2>/dev/null || echo "")

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "  Status: ${http_code} - SUCCESS"
              upload_count=$((upload_count + 1))
            else
              echo "  Status: ${http_code} - FAILED"
              echo "  Response: ${response_body}"
              failure_count=$((failure_count + 1))
            fi
          done

          echo ""
          echo "=== Upload Summary ==="
          echo "Successful: ${upload_count}"
          echo "Failed: ${failure_count}"

          if [ ${failure_count} -gt 0 ]; then
            echo "ERROR: ${failure_count} file(s) failed to upload"
            exit 1
          fi

          echo "All files uploaded successfully"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ygg-chat/client/ygg-chat-r/release

  publish_release:
    name: Publish GitHub Release + changelog
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Validate tag matches app version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -p "require('./ygg-chat/client/ygg-chat-r/package.json').version")"

          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "ERROR: Tag version (${TAG_VERSION}) does not match package version (${APP_VERSION})"
            exit 1
          fi

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG_FILE="ygg-chat/client/ygg-chat-r/CHANGELOG.md"
          RELEASE_NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" || $0 ~ "^## " ver "([[:space:]-]|$)" {
              in_section = 1
              next
            }
            in_section && /^## / { exit }
            in_section { print }
          ' "${CHANGELOG_FILE}" > "${RELEASE_NOTES_FILE}.raw"

          awk '
            BEGIN { started = 0 }
            {
              if (!started && $0 ~ /^[[:space:]]*$/) next
              started = 1
              print
            }
          ' "${RELEASE_NOTES_FILE}.raw" > "${RELEASE_NOTES_FILE}"

          if ! grep -q '[^[:space:]]' "${RELEASE_NOTES_FILE}"; then
            echo "ERROR: No changelog entry found for version ${VERSION}"
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=${RELEASE_NOTES_FILE}" >> "$GITHUB_ENV"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: ygg-chat/client/ygg-chat-r/release-merged

      - name: Upload changelog to Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${SUPABASE_BUCKET:-}" ]; then
            echo "ERROR: Supabase secrets are missing"
            exit 1
          fi

          VERSION_TAG="${GITHUB_REF_NAME}"
          VERSION_PATH="updates/changelog/${VERSION_TAG}.md"
          LATEST_PATH="updates/changelog/latest.md"

          for target_path in "${VERSION_PATH}" "${LATEST_PATH}"; do
            upload_url="${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${target_path}?upsert=true"

            http_code=$(curl -s -w "%{http_code}" -o /tmp/changelog_upload_response.txt \
              -X PUT "${upload_url}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: text/markdown; charset=utf-8" \
              --data-binary @"${RELEASE_NOTES_FILE}")

            if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
              echo "ERROR: Failed uploading ${target_path} (HTTP ${http_code})"
              cat /tmp/changelog_upload_response.txt || true
              exit 1
            fi
          done

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ygg-chat/client/ygg-chat-r/release-merged/*
          body_path: ${{ env.RELEASE_NOTES_FILE }}
          draft: false
          prerelease: false
